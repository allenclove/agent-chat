<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat - 调试面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .log-entry { font-family: monospace; font-size: 12px; }
    .log-info { color: #3b82f6; }
    .log-success { color: #22c55e; }
    .log-warning { color: #f59e0b; }
    .log-error { color: #ef4444; }
    .log-agent { color: #8b5cf6; }
    .log-message { color: #06b6d4; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div class="container mx-auto p-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-xl font-bold">🔧 Agent Chat 调试面板</h1>
      <div class="space-x-2">
        <button id="clearBtn" class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600">清空日志</button>
        <button id="testBtn" class="px-3 py-1 bg-blue-600 rounded hover:bg-blue-500">发送测试消息</button>
        <a href="/chat.html" class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600">返回聊天</a>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- Agent 状态 -->
      <div class="bg-gray-800 rounded-lg p-4">
        <h2 class="font-semibold mb-3 flex items-center">
          <span class="mr-2">🤖</span> Agent 状态
        </h2>
        <div id="agentList" class="space-y-2">
          <p class="text-gray-500">加载中...</p>
        </div>
      </div>

      <!-- 连接信息 -->
      <div class="bg-gray-800 rounded-lg p-4">
        <h2 class="font-semibold mb-3 flex items-center">
          <span class="mr-2">📡</span> 连接信息
        </h2>
        <div id="connectionInfo" class="text-sm space-y-1">
          <p>状态: <span id="wsStatus" class="text-yellow-500">未连接</span></p>
          <p>在线用户: <span id="userCount">0</span></p>
          <p>在线Agent: <span id="agentCount">0</span></p>
          <p>消息总数: <span id="msgCount">0</span></p>
        </div>
      </div>

      <!-- 快速操作 -->
      <div class="bg-gray-800 rounded-lg p-4">
        <h2 class="font-semibold mb-3 flex items-center">
          <span class="mr-2">⚡</span> 快速操作
        </h2>
        <div class="space-y-2">
          <button id="reconnectBtn" class="w-full px-3 py-2 bg-green-600 rounded hover:bg-green-500">
            重新连接 WebSocket
          </button>
          <button id="refreshAgentsBtn" class="w-full px-3 py-2 bg-purple-600 rounded hover:bg-purple-500">
            刷新 Agent 状态
          </button>
          <div class="mt-3">
            <input id="testMessage" type="text" placeholder="测试消息内容"
              class="w-full px-3 py-2 bg-gray-700 rounded text-white mb-2">
            <button id="sendTestBtn" class="w-full px-3 py-2 bg-blue-600 rounded hover:bg-blue-500">
              发送消息
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 日志面板 -->
    <div class="mt-4 bg-gray-800 rounded-lg p-4">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold flex items-center">
          <span class="mr-2">📋</span> 实时日志
        </h2>
        <div class="flex items-center space-x-2 text-sm">
          <label class="flex items-center">
            <input type="checkbox" id="filterAgent" checked class="mr-1"> Agent
          </label>
          <label class="flex items-center">
            <input type="checkbox" id="filterMessage" checked class="mr-1"> 消息
          </label>
          <label class="flex items-center">
            <input type="checkbox" id="filterError" checked class="mr-1"> 错误
          </label>
          <label class="flex items-center">
            <input type="checkbox" id="filterWs" checked class="mr-1"> WebSocket
          </label>
        </div>
      </div>
      <div id="logPanel" class="bg-gray-900 rounded p-3 h-96 overflow-y-auto text-sm">
        <p class="text-gray-500">等待日志...</p>
      </div>
    </div>

    <!-- 消息详情 -->
    <div class="mt-4 bg-gray-800 rounded-lg p-4">
      <h2 class="font-semibold mb-3 flex items-center">
        <span class="mr-2">📨</span> 最近消息（原始数据）
      </h2>
      <div id="messagePanel" class="bg-gray-900 rounded p-3 h-48 overflow-y-auto text-xs font-mono">
        <p class="text-gray-500">等待消息...</p>
      </div>
    </div>
  </div>

  <script>
    const logPanel = document.getElementById('logPanel');
    const messagePanel = document.getElementById('messagePanel');
    const agentListEl = document.getElementById('agentList');
    const wsStatusEl = document.getElementById('wsStatus');
    const userCountEl = document.getElementById('userCount');
    const agentCountEl = document.getElementById('agentCount');
    const msgCountEl = document.getElementById('msgCount');

    let ws = null;
    let msgCount = 0;
    let logs = [];

    // 日志函数
    function log(type, message, data = null) {
      const time = new Date().toLocaleTimeString();
      const entry = { time, type, message, data };
      logs.push(entry);

      const typeClass = {
        'info': 'log-info',
        'success': 'log-success',
        'warning': 'log-warning',
        'error': 'log-error',
        'agent': 'log-agent',
        'message': 'log-message',
        'ws': 'log-info'
      }[type] || 'log-info';

      const div = document.createElement('div');
      div.className = `log-entry ${typeClass} mb-1`;
      div.innerHTML = `<span class="text-gray-500">[${time}]</span> <span class="font-semibold">[${type.toUpperCase()}]</span> ${message}`;
      if (data) {
        div.innerHTML += `<br><span class="text-gray-400 ml-4">${JSON.stringify(data)}</span>`;
      }

      logPanel.appendChild(div);
      logPanel.scrollTop = logPanel.scrollHeight;

      // 保持最近500条
      while (logPanel.children.length > 500) {
        logPanel.removeChild(logPanel.firstChild);
      }
    }

    // 连接 WebSocket
    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${protocol}//${window.location.host}`;

      log('info', `正在连接: ${url}`);

      ws = new WebSocket(url);

      ws.onopen = () => {
        log('success', 'WebSocket 已连接');
        wsStatusEl.textContent = '已连接';
        wsStatusEl.className = 'text-green-500';

        // 注册为调试客户端（使用特殊 session）
        const debugSession = 'debug-' + Date.now();
        ws.send(JSON.stringify({
          type: 'join',
          payload: { session_id: debugSession }
        }));
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleMessage(data);
        } catch (e) {
          log('error', '解析消息失败', event.data);
        }
      };

      ws.onclose = (event) => {
        log('warning', `WebSocket 断开 code=${event.code} reason=${event.reason}`);
        wsStatusEl.textContent = '已断开';
        wsStatusEl.className = 'text-red-500';
      };

      ws.onerror = (err) => {
        log('error', 'WebSocket 错误', err);
      };
    }

    // 处理消息
    function handleMessage(data) {
      const { type, payload } = data;

      // 记录原始消息
      addRawMessage(data);

      switch (type) {
        case 'history':
          log('info', `收到历史消息: ${payload.messages?.length || 0} 条`);
          break;

        case 'message':
          msgCount++;
          msgCountEl.textContent = msgCount;
          const senderType = payload.sender_type === 'agent' ? '🤖' : '👤';
          log('message', `${senderType} ${payload.sender_name}: ${payload.content?.substring(0, 50)}...`);
          break;

        case 'user_list':
          userCountEl.textContent = payload.users?.length || 0;
          log('info', `用户列表更新: ${payload.users?.length || 0} 人`);
          break;

        case 'agent_list':
          agentCountEl.textContent = payload.agents?.filter(a => a.status === 'online').length || 0;
          renderAgentList(payload.agents);
          log('agent', `Agent列表更新: ${payload.agents?.length || 0} 个`);
          break;

        case 'agent_status':
          const statusIcon = payload.status === 'online' ? '🟢' : '🔴';
          log('agent', `${statusIcon} ${payload.name} ${payload.status}`);
          refreshAgentList();
          break;

        case 'error':
          log('error', `服务器错误: ${payload.message}`);
          break;

        default:
          log('info', `收到消息类型: ${type}`);
      }
    }

    // 添加原始消息
    function addRawMessage(data) {
      const div = document.createElement('div');
      div.className = 'mb-2 text-gray-300';
      div.innerHTML = `<span class="text-gray-500">${new Date().toLocaleTimeString()}</span> ${JSON.stringify(data, null, 2)}`;
      messagePanel.appendChild(div);
      messagePanel.scrollTop = messagePanel.scrollHeight;

      while (messagePanel.children.length > 50) {
        messagePanel.removeChild(messagePanel.firstChild);
      }
    }

    // 渲染 Agent 列表
    function renderAgentList(agents) {
      if (!agents || agents.length === 0) {
        agentListEl.innerHTML = '<p class="text-gray-500">暂无 Agent</p>';
        return;
      }

      agentListEl.innerHTML = agents.map(agent => `
        <div class="flex items-center justify-between p-2 bg-gray-700 rounded">
          <div class="flex items-center">
            <span class="w-2 h-2 rounded-full ${agent.status === 'online' ? 'bg-green-500' : 'bg-gray-500'} mr-2"></span>
            <span>${agent.name}</span>
          </div>
          <span class="text-xs ${agent.status === 'online' ? 'text-green-400' : 'text-gray-500'}">${agent.status}</span>
        </div>
      `).join('');
    }

    // 刷新 Agent 列表
    function refreshAgentList() {
      fetch('/api/agents')
        .then(r => r.json())
        .then(data => {
          if (data.agents) {
            renderAgentList(data.agents);
            agentCountEl.textContent = data.agents.filter(a => a.status === 'online').length;
          }
        })
        .catch(e => log('error', '获取 Agent 列表失败', e.message));
    }

    // 发送测试消息
    function sendTestMessage() {
      const content = document.getElementById('testMessage').value.trim();
      if (!content) {
        log('warning', '请输入消息内容');
        return;
      }

      if (!ws || ws.readyState !== 1) {
        log('error', 'WebSocket 未连接');
        return;
      }

      ws.send(JSON.stringify({
        type: 'message',
        payload: { content }
      }));

      log('success', `已发送: ${content}`);
      document.getElementById('testMessage').value = '';
    }

    // 事件绑定
    document.getElementById('clearBtn').onclick = () => {
      logPanel.innerHTML = '<p class="text-gray-500">日志已清空</p>';
      logs = [];
    };

    document.getElementById('testBtn').onclick = () => {
      document.getElementById('testMessage').value = '测试消息 ' + Date.now();
      sendTestMessage();
    };

    document.getElementById('sendTestBtn').onclick = sendTestMessage;

    document.getElementById('reconnectBtn').onclick = () => {
      if (ws) ws.close();
      connect();
    };

    document.getElementById('refreshAgentsBtn').onclick = refreshAgentList;

    // 启动
    log('info', '调试面板已启动');
    connect();
    refreshAgentList();

    // 定时刷新
    setInterval(refreshAgentList, 10000);
  </script>
</body>
</html>
