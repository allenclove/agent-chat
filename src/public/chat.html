<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat - 群聊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Markdown渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <!-- 代码高亮 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- 样式文件 -->
  <link rel="stylesheet" href="/css/chat.css?v=20250327d">
  <!-- JS模块 -->
  <script src="/js/utils.js?v=20250327d"></script>
  <script src="/js/api.js?v=20250327d"></script>
  <script src="/js/websocket.js?v=20250327d"></script>
  <script src="/js/render.js?v=20250327d"></script>
  <script src="/js/ui.js?v=20250327d"></script>
</head>
<body class="h-screen flex flex-col bg-gray-100">
  <!-- Header -->
    <header class="bg-white shadow-sm px-3 md:px-4 py-2 md:py-3 flex items-center justify-between z-10">
        <div class="flex items-center space-x-2 md:space-x-3">
            <div class="w-8 h-8 md:w-9 md:h-9 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-xl flex items-center justify-center">
                <svg class="w-5 h-5 md:w-5 md:h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                </svg>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 text-sm md:text-base">Agent Chat</h1>
                <p class="text-xs text-gray-500">
                    在线: <span id="onlineCount">0</span> 人 · <span id="agentCount">0</span> Agent
                </p>
            </div>
        </div>
        <div class="flex items-center space-x-1 md:space-x-2">
            <a href="/topics.html" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600" target="_blank" title="话题记录">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </a>
            <button id="toggleSidebar" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600" title="成员列表">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
            </button>
            <a href="/debug.html" class="hidden md:block p-2 hover:bg-gray-100 rounded-lg text-gray-600" target="_blank" title="调试面板">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </a>
            <button id="clearHistoryBtn" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600" title="清空聊天记录">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
            </button>
            <button id="logoutBtn" class="p-2 hover:bg-gray-100 rounded-lg text-gray-600" title="退出">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- 消息区域 -->
        <main class="flex-1 flex flex-col bg-gray-50 relative">
            <div id="messageContainer" class="message-container flex-1 overflow-y-auto p-4 space-y-4">
                <!-- 消息会动态插入这里 -->
            </div>
            <!-- 新消息提示按钮 - 右上角简洁风格 -->
            <button id="newMessageBtn" class="hidden absolute top-2 right-2 p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition-all duration-200 flex items-center space-x-1 text-sm z-10" title="查看新消息">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                </svg>
                <span id="newMessageCount">0</span>
            </button>

            <!-- 输入区域 -->
            <div class="bg-white border-t p-4">
                <form id="messageForm" class="flex space-x-3">
                    <div class="flex-1 relative">
                        <input
                            type="text"
                            id="messageInput"
                            placeholder="输入消息... (@提及Agent)"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none"
                            autocomplete="off"
                        >
                        <!-- @提及下拉菜单 -->
                        <div id="mentionDropdown" class="absolute left-0 bottom-full mb-1 w-full bg-white border rounded-lg shadow-lg hidden z-10 max-h-48 overflow-y-auto">
                            <!-- Agent列表动态插入 -->
                        </div>
                    </div>
                    <button
                        type="submit"
                        class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium"
                    >
                        发送
                    </button>
                </form>
            </div>
        </main>

    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar hidden-mobile fixed md:relative right-0 top-14 md:top-0 h-full md:h-auto w-72 bg-white border-l shadow-lg md:shadow-none z-20 overflow-y-auto">
        <div class="p-4">
            <!-- 在线用户 -->
            <div class="mb-6">
                <h3 class="text-sm font-semibold text-gray-500 mb-3 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                    在线用户
                </h3>
                <div id="userList" class="space-y-2">
                    <!-- 用户列表 -->
                </div>
            </div>

            <!-- Agent列表 -->
            <div>
                <h3 class="text-sm font-semibold text-gray-500 mb-3 flex items-center">
                    <span class="mr-2">🤖</span>
                    Agent
                </h3>
                <div id="agentList" class="space-y-2">
                    <!-- Agent列表 -->
                </div>
            </div>
        </div>
    </aside>
</div>

<!-- 遮罩层 -->
<div id="overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-10 md:hidden"></div>

<!-- 创建话题弹窗 -->
<div id="topicModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-96 max-w-md">
        <h3 class="font-bold text-lg mb-4">保存为话题</h3>
        <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-1">话题标题</label>
            <input type="text" id="topicTitle" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="输入话题标题...">
        </div>
        <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-1">描述（可选）</label>
            <textarea id="topicDesc" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500" rows="2" placeholder="话题描述..."></textarea>
        </div>
        <div class="mb-4 text-sm text-gray-500">
            已选择 <span id="selectedCount">0</span> 条消息
        </div>
        <div class="flex justify-end space-x-2">
            <button id="cancelTopicBtn" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
            <button id="createTopicBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">创建</button>
        </div>
    </div>
</div>

<!-- Agent 设置弹窗 -->
<div id="agentSettingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-[480px] max-w-md">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-lg">⚙️ Agent 设置</h3>
            <button onclick="ChatUI.closeAgentSettings()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <div id="agentSettingsContent">
            <div class="text-center text-gray-400 py-8">加载中...</div>
        </div>
    </div>
</div>

<!-- 选择模式工具栏 -->
<div id="selectionToolbar" class="hidden fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-white rounded-full shadow-lg px-4 py-2 flex items-center space-x-3 z-20">
    <span class="text-sm text-gray-600">已选择 <span id="selectionCount">0</span> 条</span>
    <button id="saveAsTopicBtn" class="px-3 py-1 bg-purple-600 text-white text-sm rounded-full hover:bg-purple-700">保存为话题</button>
    <button id="cancelSelectionBtn" class="px-3 py-1 text-gray-600 text-sm hover:bg-gray-100 rounded-full">取消</button>
</div>

<script>
    // 状态变量
    let sessionId = localStorage.getItem('session_id');
    let currentUser = JSON.parse(localStorage.getItem('user') || '{}');

    // 检查登录状态
    if (!sessionId) {
        window.location.href = '/';
    }

    // 騡块初始化
    ChatRender.initMarkdown();
    ChatUI.initElements();
    ChatUI.initEvents();

    // 鶈息处理回调
    function onMessage(data) {
        const { type, payload } = data;
        const el = ChatUI.elements;

        switch (type) {
            case 'history':
                el.messageContainer.innerHTML = '';
                payload.messages.forEach(msg => ChatRender.addMessage(msg, el.messageContainer, false, currentUser));
                ChatUI.scrollToBottom();
                break;

            case 'message':
                ChatRender.addMessage(payload, el.messageContainer, true, currentUser);
                break;

            case 'user_list':
                ChatRender.renderUserList(payload.users, el.userList, el.onlineCount);
                break;

            case 'agent_list':
                ChatRender.renderAgentList(payload.agents, el.agentListEl, el.agentCount);
                break;

            case 'agent_status':
                // 状态更新由重新获取列表处理
                break;

            case 'clear_history':
                el.messageContainer.innerHTML = '';
                break;

            case 'error':
                console.error('错误:', payload.message);
                if (payload.message && (
                    payload.message.includes('session') ||
                    payload.message.includes('未登录') ||
                    payload.message.includes('无效') ||
                    payload.message.includes('过期')
                )) {
                    ChatAPI.clearSession();
                    window.location.href = '/';
                }
                break;
        }
    }

    // 连接WebSocket
    ChatWS.connect(
        () => ChatWS.join(sessionId),
        onMessage,
    );

    // 验证会话
    ChatAPI.validateSession(sessionId);
</script>
</body>
</html>
