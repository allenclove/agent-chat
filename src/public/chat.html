<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat - 群聊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Markdown渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/xml.min.js"></script>
  <style>
    .message-container {
      scroll-behavior: smooth;
    }
    .message-container::-webkit-scrollbar {
      width: 6px;
    }
    .message-container::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    .message-container::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }
    .sidebar {
      transition: transform 0.3s ease;
    }
    .sidebar.hidden-mobile {
      transform: translateX(100%);
    }
    @media (min-width: 768px) {
      .sidebar.hidden-mobile {
        transform: translateX(0);
      }
    }
    /* Markdown样式 */
    .markdown-content {
      line-height: 1.6;
    }
    .markdown-content p {
      margin: 0.5em 0;
    }
    .markdown-content p:first-child {
      margin-top: 0;
    }
    .markdown-content p:last-child {
      margin-bottom: 0;
    }
    .markdown-content code:not(pre code) {
      background: rgba(0,0,0,0.1);
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .markdown-content pre {
      margin: 0.5em 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .markdown-content pre code {
      display: block;
      padding: 1em;
      overflow-x: auto;
      font-size: 0.85em;
    }
    .markdown-content ul, .markdown-content ol {
      margin: 0.5em 0;
      padding-left: 1.5em;
    }
    .markdown-content li {
      margin: 0.25em 0;
    }
    .markdown-content blockquote {
      border-left: 3px solid rgba(0,0,0,0.2);
      padding-left: 0.75em;
      margin: 0.5em 0;
      opacity: 0.85;
    }
    .markdown-content h1, .markdown-content h2, .markdown-content h3 {
      margin: 0.5em 0 0.25em;
      font-weight: 600;
    }
    .markdown-content a {
      color: inherit;
      text-decoration: underline;
    }
    /* 代码块容器 */
    .code-block-wrapper {
      position: relative;
      margin: 0.5em 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .code-block-wrapper pre {
      margin: 0;
    }
    .code-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.25em 0.75em;
      background: #2d2d2d;
      color: #888;
      font-size: 0.75em;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
      padding: 0.2em 0.5em;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #444;
      color: #fff;
    }
    .copy-btn.copied {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }
    /* 自我消息的markdown调整 */
    .markdown-content.self-message code:not(pre code) {
      background: rgba(255,255,255,0.2);
    }
    .markdown-content.self-message blockquote {
      border-left-color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body class="h-screen flex flex-col bg-gray-100">
  <!-- Header -->
  <header class="bg-white shadow-sm px-4 py-3 flex items-center justify-between z-10">
    <div class="flex items-center space-x-3">
      <span class="text-2xl">💬</span>
      <div>
        <h1 class="font-bold text-gray-800">Agent Chat</h1>
        <p class="text-xs text-gray-500">
          在线: <span id="onlineCount">0</span> 人 · <span id="agentCount">0</span> Agent
        </p>
      </div>
    </div>
    <div class="flex items-center space-x-2">
      <button id="toggleSidebar" class="md:hidden p-2 hover:bg-gray-100 rounded-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
        </svg>
      </button>
      <a href="/admin.html" class="px-3 py-1.5 text-sm text-gray-600 hover:bg-gray-100 rounded-lg" title="平台设置">
        ⚙️ 设置
      </a>
      <button id="logoutBtn" class="px-3 py-1.5 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">
        退出
      </button>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden">
    <!-- 消息区域 -->
    <main class="flex-1 flex flex-col bg-gray-50">
      <div id="messageContainer" class="message-container flex-1 overflow-y-auto p-4 space-y-4">
        <!-- 消息会动态插入这里 -->
      </div>

      <!-- 输入区域 -->
      <div class="bg-white border-t p-4 relative">
        <form id="messageForm" class="flex space-x-3">
          <div class="flex-1 relative">
            <input
              type="text"
              id="messageInput"
              placeholder="输入消息... (@提及Agent)"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none"
              autocomplete="off"
            >
            <!-- @提及下拉菜单 -->
            <div id="mentionDropdown" class="absolute left-0 bottom-full mb-1 w-full bg-white border rounded-lg shadow-lg hidden z-10 max-h-48 overflow-y-auto">
              <!-- Agent列表动态插入 -->
            </div>
          </div>
          <button
            type="submit"
            class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium"
          >
            发送
          </button>
        </form>
      </div>
    </main>

    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar hidden-mobile fixed md:relative right-0 top-14 md:top-0 h-full md:h-auto w-72 bg-white border-l shadow-lg md:shadow-none z-20 overflow-y-auto">
      <div class="p-4">
        <!-- 在线用户 -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold text-gray-500 mb-3 flex items-center">
            <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
            在线用户
          </h3>
          <div id="userList" class="space-y-2">
            <!-- 用户列表 -->
          </div>
        </div>

        <!-- Agent列表 -->
        <div>
          <h3 class="text-sm font-semibold text-gray-500 mb-3 flex items-center">
            <span class="mr-2">🤖</span>
            Agent
          </h3>
          <div id="agentList" class="space-y-2">
            <!-- Agent列表 -->
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- 遮罩层 -->
  <div id="overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-10 md:hidden"></div>

  <script>
    const messageContainer = document.getElementById('messageContainer');
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');
    const userList = document.getElementById('userList');
    const agentListEl = document.getElementById('agentList');
    const onlineCount = document.getElementById('onlineCount');
    const agentCount = document.getElementById('agentCount');
    const logoutBtn = document.getElementById('logoutBtn');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const mentionDropdown = document.getElementById('mentionDropdown');

    let ws = null;
    let sessionId = localStorage.getItem('session_id');
    let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    let agents = []; // 存储Agent列表
    let mentionStartIndex = -1; // @符号的位置
    let showMentionDropdown = false;

    // 检查登录状态
    if (!sessionId) {
      window.location.href = '/';
    }

    // 侧边栏切换
    toggleSidebar.addEventListener('click', () => {
      sidebar.classList.toggle('hidden-mobile');
      overlay.classList.toggle('hidden');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.add('hidden-mobile');
      overlay.classList.add('hidden');
    });

    // 登出
    logoutBtn.addEventListener('click', async () => {
      try {
        await fetch('/api/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
      } catch (e) {}
      localStorage.removeItem('session_id');
      localStorage.removeItem('user');
      window.location.href = '/';
    });

    // 连接WebSocket
    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        console.log('WebSocket已连接');
        ws.send(JSON.stringify({
          type: 'join',
          payload: { session_id: sessionId }
        }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };

      ws.onclose = () => {
        console.log('WebSocket已断开，3秒后重连...');
        setTimeout(connect, 3000);
      };

      ws.onerror = (err) => {
        console.error('WebSocket错误:', err);
      };
    }

    // 处理收到的消息
    function handleMessage(data) {
      const { type, payload } = data;

      switch (type) {
        case 'history':
          messageContainer.innerHTML = '';
          payload.messages.forEach(msg => addMessage(msg, false));
          scrollToBottom();
          break;

        case 'message':
          addMessage(payload, true);
          break;

        case 'user_list':
          renderUserList(payload.users);
          break;

        case 'agent_list':
          renderAgentList(payload.agents);
          break;

        case 'agent_status':
          updateAgentStatus(payload);
          break;

        case 'error':
          console.error('错误:', payload.message);
          break;
      }
    }

    // 添加消息到界面
    function addMessage(msg, scroll = true) {
      const isAgent = msg.sender_type === 'agent';
      const isSelf = msg.sender_id === currentUser.id;
      const time = new Date(msg.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const msgId = 'msg-' + msg.id + '-' + Date.now();

      const div = document.createElement('div');
      div.className = `flex ${isSelf ? 'justify-end' : 'justify-start'}`;

      div.innerHTML = `
        <div class="max-w-xs md:max-w-md lg:max-w-xl ${isSelf ? 'order-2' : ''}">
          <div class="flex items-end space-x-2 ${isSelf ? 'flex-row-reverse space-x-reverse' : ''}">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm ${isAgent ? 'bg-purple-100' : 'bg-blue-100'}">
              ${isAgent ? '🤖' : '👤'}
            </div>
            <div class="min-w-0">
              <div class="text-xs text-gray-500 mb-1 ${isSelf ? 'text-right' : ''}">${msg.sender_name}</div>
              <div class="px-4 py-2 rounded-2xl ${isSelf ? 'bg-purple-600 text-white' : isAgent ? 'bg-purple-100 text-purple-900' : 'bg-white text-gray-800'} shadow-sm">
                <div id="${msgId}" class="markdown-content ${isSelf ? 'self-message' : ''}">${renderContent(msg.content, isSelf)}</div>
              </div>
              <div class="text-xs text-gray-400 mt-1 ${isSelf ? 'text-right' : ''}">${time}</div>
            </div>
          </div>
        </div>
      `;

      messageContainer.appendChild(div);

      // 为代码块添加复制按钮
      addCopyButtons(msgId);

      if (scroll) {
        scrollToBottom();
      }
    }

    // 渲染消息内容（Markdown + @提及高亮）
    function renderContent(content, isSelf) {
      // 先处理@提及，用临时占位符保护
      // 使用随机字符串作为占位符前缀，避免与用户内容冲突
      const placeholderPrefix = 'MNTN' + Math.random().toString(36).slice(2, 8) + 'X';
      const mentionPlaceholders = [];
      let processedContent = content;

      if (agents && agents.length > 0) {
        const sortedAgents = [...agents].sort((a, b) => b.name.length - a.name.length);
        for (const agent of sortedAgents) {
          const escapedName = agent.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const regex = new RegExp(`@${escapedName}`, 'g');
          const highlightClass = isSelf
            ? 'bg-purple-500 text-white px-1 rounded'
            : 'bg-purple-200 text-purple-800 px-1 rounded';
          // 使用随机前缀+数字作为占位符，确保不会被Markdown解析
          const placeholder = placeholderPrefix + mentionPlaceholders.length;
          processedContent = processedContent.replace(regex, placeholder);
          mentionPlaceholders.push(`<span class="${highlightClass}">@${escapeHtml(agent.name)}</span>`);
        }
      }

      // 渲染Markdown
      let html;
      try {
        // 配置marked
        marked.setOptions({
          highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
              try {
                return hljs.highlight(code, { language: lang }).value;
              } catch (e) {}
            }
            return hljs.highlightAuto(code).value;
          },
          breaks: true,
          gfm: true
        });
        html = marked.parse(processedContent);
      } catch (e) {
        html = escapeHtml(processedContent).replace(/\n/g, '<br>');
      }

      // 恢复@提及
      mentionPlaceholders.forEach((mention, i) => {
        // 处理原始占位符和可能的HTML编码版本
        const placeholder = placeholderPrefix + i;
        html = html.split(placeholder).join(mention);
      });

      return html;
    }

    // 为代码块添加复制按钮
    function addCopyButtons(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      const preBlocks = container.querySelectorAll('pre');
      preBlocks.forEach((pre, index) => {
        // 获取语言
        const code = pre.querySelector('code');
        const langClass = code?.className.match(/language-(\w+)/);
        const lang = langClass ? langClass[1] : 'code';

        // 创建包装器
        const wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);

        // 创建头部
        const header = document.createElement('div');
        header.className = 'code-block-header';
        header.innerHTML = `
          <span>${lang}</span>
          <button class="copy-btn" data-index="${index}">复制</button>
        `;

        // 移动pre到wrapper
        wrapper.appendChild(header);
        wrapper.appendChild(pre);

        // 绑定复制事件
        const copyBtn = header.querySelector('.copy-btn');
        copyBtn.addEventListener('click', async () => {
          const codeText = code?.textContent || pre.textContent;
          try {
            await navigator.clipboard.writeText(codeText);
            copyBtn.textContent = '已复制';
            copyBtn.classList.add('copied');
            setTimeout(() => {
              copyBtn.textContent = '复制';
              copyBtn.classList.remove('copied');
            }, 2000);
          } catch (e) {
            copyBtn.textContent = '失败';
            setTimeout(() => {
              copyBtn.textContent = '复制';
            }, 2000);
          }
        });
      });
    }

    // 渲染用户列表
    function renderUserList(users) {
      onlineCount.textContent = users.length;
      userList.innerHTML = users.map(user => `
        <div class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-50">
          <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-sm">👤</div>
          <span class="text-sm text-gray-700">${user.display_name || user.username}</span>
        </div>
      `).join('');
    }

    // 渲染Agent列表
    function renderAgentList(agentList) {
      agents = agentList; // 存储到全局变量
      const onlineAgents = agents.filter(a => a.status === 'online');
      agentCount.textContent = onlineAgents.length;

      agentListEl.innerHTML = agents.map(agent => `
        <div class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-50">
          <div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-sm">🤖</div>
          <span class="text-sm text-gray-700 flex-1">${agent.name}</span>
          <span class="w-2 h-2 rounded-full ${agent.status === 'online' ? 'bg-green-500' : 'bg-gray-300'}"></span>
        </div>
      `).join('');
    }

    // 更新Agent状态
    function updateAgentStatus(data) {
      // 重新请求Agent列表
      // 这里简化处理，实际可以局部更新
    }

    // 发送消息
    messageForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const content = messageInput.value.trim();
      if (!content || !ws || ws.readyState !== 1) return;

      ws.send(JSON.stringify({
        type: 'message',
        payload: { content }
      }));

      messageInput.value = '';
    });

    // 回车发送
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        if (showMentionDropdown) {
          e.preventDefault();
          selectFirstMention();
        } else {
          e.preventDefault();
          messageForm.dispatchEvent(new Event('submit'));
        }
      }
    });

    // @提及功能 - 输入监听
    messageInput.addEventListener('input', (e) => {
      const value = messageInput.value;
      const cursorPos = messageInput.selectionStart;

      // 查找当前光标前最近的@符号
      const textBeforeCursor = value.substring(0, cursorPos);
      const lastAtIndex = textBeforeCursor.lastIndexOf('@');

      if (lastAtIndex !== -1) {
        // 检查@后面是否有空格（如果有空格说明已经结束提及）
        const textAfterAt = textBeforeCursor.substring(lastAtIndex + 1);
        if (!textAfterAt.includes(' ')) {
          mentionStartIndex = lastAtIndex;
          const searchText = textAfterAt.toLowerCase();
          showMentionSuggestions(searchText);
          return;
        }
      }

      hideMentionDropdown();
    });

    // 显示@提及建议
    function showMentionSuggestions(searchText) {
      const filteredAgents = agents.filter(agent =>
        agent.status === 'online' &&
        agent.name.toLowerCase().includes(searchText)
      );

      if (filteredAgents.length === 0) {
        hideMentionDropdown();
        return;
      }

      mentionDropdown.innerHTML = filteredAgents.map((agent, index) => `
        <div class="mention-item px-4 py-2 hover:bg-purple-50 cursor-pointer flex items-center space-x-2 ${index === 0 ? 'bg-purple-50' : ''}"
             data-agent-name="${escapeHtml(agent.name)}">
          <span class="text-purple-600">🤖</span>
          <span>${highlightMatch(agent.name, searchText)}</span>
        </div>
      `).join('');

      mentionDropdown.classList.remove('hidden');
      showMentionDropdown = true;

      // 绑定点击事件
      mentionDropdown.querySelectorAll('.mention-item').forEach(item => {
        item.addEventListener('click', () => {
          insertMention(item.dataset.agentName);
        });
      });
    }

    // 高亮匹配文字
    function highlightMatch(name, search) {
      if (!search) return escapeHtml(name);
      const escapedName = escapeHtml(name);
      const escapedSearch = escapeHtml(search);
      const regex = new RegExp(`(${escapedSearch})`, 'gi');
      return escapedName.replace(regex, '<span class="text-purple-600 font-semibold">$1</span>');
    }

    // 插入选中的Agent名称
    function insertMention(agentName) {
      const value = messageInput.value;
      const beforeMention = value.substring(0, mentionStartIndex);
      const afterCursor = value.substring(messageInput.selectionStart);

      messageInput.value = beforeMention + '@' + agentName + ' ' + afterCursor;
      messageInput.focus();

      // 设置光标位置到插入内容之后
      const newPos = beforeMention.length + agentName.length + 2;
      messageInput.setSelectionRange(newPos, newPos);

      hideMentionDropdown();
    }

    // 选择第一个提及建议
    function selectFirstMention() {
      const firstItem = mentionDropdown.querySelector('.mention-item');
      if (firstItem) {
        insertMention(firstItem.dataset.agentName);
      }
    }

    // 隐藏@提及下拉菜单
    function hideMentionDropdown() {
      mentionDropdown.classList.add('hidden');
      showMentionDropdown = false;
    }

    // 点击其他地方关闭下拉菜单
    document.addEventListener('click', (e) => {
      if (!messageInput.contains(e.target) && !mentionDropdown.contains(e.target)) {
        hideMentionDropdown();
      }
    });

    // 方向键导航@提及列表
    messageInput.addEventListener('keydown', (e) => {
      if (!showMentionDropdown) return;

      const items = mentionDropdown.querySelectorAll('.mention-item');
      const currentIndex = Array.from(items).findIndex(item => item.classList.contains('bg-purple-50'));

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const nextIndex = (currentIndex + 1) % items.length;
        items[currentIndex]?.classList.remove('bg-purple-50');
        items[nextIndex]?.classList.add('bg-purple-50');
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prevIndex = (currentIndex - 1 + items.length) % items.length;
        items[currentIndex]?.classList.remove('bg-purple-50');
        items[prevIndex]?.classList.add('bg-purple-50');
      } else if (e.key === 'Tab' || e.key === 'Enter') {
        e.preventDefault();
        const selectedItem = mentionDropdown.querySelector('.mention-item.bg-purple-50');
        if (selectedItem) {
          insertMention(selectedItem.dataset.agentName);
        }
      } else if (e.key === 'Escape') {
        hideMentionDropdown();
      }
    });

    // 滚动到底部
    function scrollToBottom() {
      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    // HTML转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 启动
    connect();
  </script>
</body>
</html>
