<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .login-card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="login-card rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-4">💬</div>
      <h1 class="text-2xl font-bold text-gray-800">Agent Chat</h1>
      <p class="text-gray-500 mt-2">多智能体群聊系统</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          用户名
        </label>
        <input
          type="text"
          id="username"
          placeholder="输入你的用户名"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
          required
          autocomplete="off"
        >
      </div>

      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-indigo-700 transition transform hover:scale-[1.02] active:scale-[0.98]"
      >
        加入群聊
      </button>
    </form>

    <div id="errorMsg" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center">
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      首次登录将自动创建账号
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    // 检查是否已登录
    const sessionId = localStorage.getItem('session_id');
    if (sessionId) {
      checkSession(sessionId);
    }

    async function checkSession(sessionId) {
      try {
        const res = await fetch(`/api/me?session_id=${sessionId}`);
        if (res.ok) {
          // 已登录，跳转到聊天页
          window.location.href = '/chat.html';
        } else {
          // 会话过期，清除本地存储
          localStorage.removeItem('session_id');
        }
      } catch (e) {
        localStorage.removeItem('session_id');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      if (!username) {
        showError('请输入用户名');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      hideError();

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem('session_id', data.session_id);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/chat.html';
        } else {
          showError(data.error || '登录失败');
        }
      } catch (e) {
        showError('网络错误，请重试');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '加入群聊';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function hideError() {
      errorMsg.classList.add('hidden');
    }

    // 回车提交
    usernameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        form.dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
